<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Captcha Produção</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      white-space: pre-wrap;
      border-radius: 8px;
    }

    button {
      padding: 10px 20px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<h2>Captcha Teste</h2>

<button id="btn">Validar Captcha</button>

<pre id="status">Aguardando...</pre>

<script src="https://ca.turing.captcha.qcloud.com/TJNCaptcha-global.js"></script>

<script>

const btn = document.getElementById("btn");
const status = document.getElementById("status");

/**
 * 🔥 MOSTRA RAW EXATO
 */
function set(obj) {
  status.innerText =
    typeof obj === "string"
      ? obj
      : JSON.stringify(obj, null, 2);
}

/**
 * 🔥 BACKEND CALL
 */
async function sendToBackend(ticket, randstr) {

  const res = await fetch("/api/captcha/verify", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ ticket, randstr })
  });

  const data = await res.json();

  console.log("[BACKEND RAW]", data);

  /**
   * 🔥 EXIBIR EXATAMENTE COMO TENCENT
   */
  set({
    "[CAPTCHA] Tencent Response": data.Response
  });

}

btn.onclick = function () {

  const container = document.createElement("div");
  document.body.appendChild(container);

  const captcha = new TencentCaptcha(
    container,
    "189904786",
    function (res) {

      console.log("CAPTCHA RESPONSE:", res);

      container.remove();

      if (res.ret === 0) {
        set("Validando backend...");
        sendToBackend(res.ticket, res.randstr);
      } else {
        set("Captcha cancelado");
      }

    },
    {}
  );

  captcha.show();

};

</script>

</body>

</html>
