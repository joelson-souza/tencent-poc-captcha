<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tencent Captcha - São Paulo - Zona 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>

  <div class="app-shell">

    <div class="app-container">

      <div class="card">

        <h2 class="title">Tencent Captcha - São Paulo</h2>

        <button id="btn" class="btn-captcha">Validar Captcha <i class="fa-solid fa-circle-check"></i></button>

        <div id="status" class="status">
          Aguardando validação ...
        </div>

        <button id="redirectBtn" class="btn" style="display:none; margin-top:20px;">
          Ver Resultados <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </button>

      </div>

    </div>

  </div>

  <script src="https://ca.turing.captcha.qcloud.com/TJNCaptcha-global.js"></script>
  <script src="app.js"></script>

</body>

</html>
